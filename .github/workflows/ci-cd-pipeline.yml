name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: github/codeql-action/init@v2
        with:
          languages: python
          config-file: .github/codeql-config.yml
      - uses: github/codeql-action/analyze@v2

  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run flake8
        run: flake8 .
      - name: Run pytest
        run: pytest

  deploy:
    name: Deploy Stage
    runs-on: ubuntu-latest
    needs: [codeql, tests]
    steps:
      - name: Simulate deploy
        run: echo "Deploy stage completed!"